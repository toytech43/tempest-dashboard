<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tempest Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2c3e50">

</head>

<body>

<div class="weather-card">

<header>

<h1 id="location">Paramus, NJ</h1>
<p id="date"></p>
<div class="sun-times">
<div class="sun-item">
<div class="sun-label"><i class="wi wi-sunrise"></i> Sunrise</div>
<span id="sunrise"></span>
</div>
<div class="sun-item">
<div class="sun-label"><i class="wi wi-sunset"></i> Sunset</div>
<span id="sunset"></span>
</div>
</div>

</header>

<section class="current-weather">

<div class="left">

<div class="temp-block">

<div class="weather-icon">
<img id="weatherIcon" src="weather-icons/sunny.svg">
</div>

<div id="conditions" class="conditions"></div>

<div class="temperature">
<span id="temp">--</span>°F
</div>

<div class="feels">
Feels Like <span id="feels">--</span>°
</div>

</div>

</div>

<div class="right">

<div class="metric">
<label><i class="wi wi-strong-wind"></i> Wind</label>
<span id="wind"></span>
</div>

<div class="metric">
<label><i class="wi wi-humidity"></i> Humidity</label>
<span id="humidity"></span>
</div>

<div class="metric">
<label><i class="wi wi-barometer"></i> Pressure</label>
<span id="pressure"></span>
</div>

<div class="metric">
<label><i class="wi wi-day-sunny"></i> UV</label>
<span id="uv"></span>
</div>

<div class="metric">
<label><i class="wi wi-hot"></i> Solar</label>
<span id="solar"></span>
</div>

<div class="metric">
<label><i class="wi wi-raindrop"></i> Rain</label>
<span id="rain"></span>
</div>

</div>

</section>


<section class="hourly">

<h2>Hourly Forecast</h2>

<div class="hourly-row" id="hourly"></div>

</section>


<section class="forecast" id="forecast"></section>

</div>

<script src="app.js"></script>

</body>

</html>
