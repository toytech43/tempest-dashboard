<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tempest Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="weather-card">

<header>

<h1 id="location">My Weather Station</h1>
<p id="date"></p>

</header>

<section class="current-weather">

<div class="left">

<div class="weather-icon">☀️</div>

<div class="temperature">

<span id="temp">--</span>°F

</div>

<div class="feels">

Feels Like <span id="feels">--</span>°

</div>

</div>

<div class="right">

<div class="metric">
<label>Wind</label>
<span id="wind"></span>
</div>

<div class="metric">
<label>Humidity</label>
<span id="humidity"></span>
</div>

<div class="metric">
<label>Pressure</label>
<span id="pressure"></span>
</div>

<div class="metric">
<label>UV Index</label>
<span id="uv"></span>
</div>

<div class="metric">
<label>Solar</label>
<span id="solar"></span>
</div>

<div class="metric">
<label>Rain</label>
<span id="rain"></span>
</div>

</div>

</section>


<section class="hourly">

<h2>Hourly Forecast</h2>

<div class="hourly-row" id="hourly"></div>

</section>


<section class="forecast" id="forecast"></section>

</div>

<script src="app.js"></script>

</body>

</html>
